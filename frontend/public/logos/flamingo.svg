<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <rect width="400" height="200" fill="#fff0f5"/>
  <!-- Flamingo silhouette -->
  <g transform="translate(60, 160)">
    <!-- Body -->
    <ellipse cx="0" cy="-50" rx="22" ry="15" fill="#FF6B9D" transform="rotate(-20)"/>
    <!-- Neck -->
    <path d="M 8,-62 Q30,-80 20,-110" fill="none" stroke="#FF6B9D" stroke-width="10" stroke-linecap="round"/>
    <!-- Head -->
    <circle cx="20" cy="-112" r="10" fill="#FF6B9D"/>
    <!-- Beak -->
    <path d="M 27,-108 L 38,-116 L 27,-114 Z" fill="#e8a020"/>
    <!-- Leg -->
    <line x1="0" y1="-38" x2="-5" y2="0" stroke="#FF6B9D" stroke-width="5" stroke-linecap="round"/>
    <line x1="-5" y1="0" x2="-12" y2="0" stroke="#FF6B9D" stroke-width="4" stroke-linecap="round"/>
    <line x1="-5" y1="0" x2="-2" y2="0" stroke="#FF6B9D" stroke-width="4" stroke-linecap="round"/>
  </g>
  <text x="115" y="100" font-family="'Helvetica Neue', Arial, sans-serif" font-size="44" font-weight="800" fill="#FF6B9D" text-anchor="start" letter-spacing="1">flamingo</text>
</svg>
