<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 200" width="360" height="200">
  <rect width="360" height="200" fill="#1a1a1a"/>
  <!-- Smiley face -->
  <g transform="translate(70, 100)">
    <circle cx="0" cy="0" r="55" fill="none" stroke="#FFE000" stroke-width="6"/>
    <!-- Eyes -->
    <circle cx="-18" cy="-12" r="7" fill="#FFE000"/>
    <circle cx="18" cy="-12" r="7" fill="#FFE000"/>
    <!-- Smile -->
