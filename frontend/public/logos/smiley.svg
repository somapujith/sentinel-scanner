  </g>
  <text x="148" y="90" font-family="'Helvetica Neue', Arial, sans-serif" font-size="50" font-weight="900" fill="#FFE000" text-anchor="start" letter-spacing="-1">PULP</text>
  <text x="150" y="128" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="400" fill="#ffffff88" text-anchor="start" letter-spacing="5">STUDIO</text>
