services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////app/data/scans.db
    volumes:
      - scanner-data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5178:5178"
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend

volumes:
  scanner-data:
